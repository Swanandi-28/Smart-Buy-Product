<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuyWise — Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">BuyWise</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="categories.html">Categories</a></li>
      <li><a href="compare.html">Compare</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <a href="profile.html" class="nav-profile">
      <i class="fa-solid fa-user"></i>
      <span>Profile</span>
    </a>
  </nav>

  <div class="profile-wrapper">
    <div class="login-card">
      <h2>Login / Sign Up</h2>

      <div class="phone-input">
        <span class="country-code">+91</span>
        <input type="tel" placeholder="Mobile Number" maxlength="10">
      </div>

      <label class="terms-label">
        <input type="checkbox">
        By continuing, I agree to the <a href="#">Terms of Use</a> &amp;
        <a href="#">Privacy Policy</a> and I am above 18 years old.
      </label>

      <button class="btn-continue">CONTINUE</button>

      <p class="login-help">Have trouble logging in? <a href="#">Get help</a></p>
    </div>
  </div>

  <script src="main.js"></script>

</body>
</html>
